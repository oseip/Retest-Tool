name: Build Binaries

on:
  push:
    tags: ['v*']            # only build when you push a version tag

permissions:
  contents: write           # needed to upload files to GitHub Releases

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: nemesis-tool-macos
          - os: ubuntu-latest
            artifact: nemesis-tool-linux
          - os: windows-latest
            artifact: nemesis-tool-windows.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller retest.spec --noconfirm

      # Attach directly to the GitHub Release — no artifact storage needed
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
