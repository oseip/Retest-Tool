name: Build Binaries

on:
  push:
    branches: [main]        # builds artifacts on every push
    tags: ['v*']            # builds + attaches to release on version tags

permissions:
  contents: write           # needed to upload files to GitHub Releases

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: retest-tool-macos
          - os: ubuntu-latest
            artifact: retest-tool-linux
          - os: windows-latest
            artifact: retest-tool-windows.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller retest.spec --noconfirm

      # Always upload as workflow artifact (downloadable from Actions tab)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

      # Only attach to GitHub Release when a version tag was pushed
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
