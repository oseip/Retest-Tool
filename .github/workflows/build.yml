name: Build Executables

# Triggers:
#   • Push a version tag:  git tag v1.2 && git push --tags
#   • Manual trigger from the Actions tab
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create/upload GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            asset_name: retest-tool-linux

          - os: macos-latest
            label: macos
            asset_name: retest-tool-macos

          - os: windows-latest
            label: windows
            asset_name: retest-tool-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller retest.spec

      # ── Rename output to include platform label ──────────────────────────
      - name: Rename (Linux / macOS)
        if: runner.os != 'Windows'
        run: mv dist/retest-tool dist/${{ matrix.asset_name }}

      - name: Rename (Windows)
        if: runner.os == 'Windows'
        run: mv dist/retest-tool.exe dist/${{ matrix.asset_name }}

      # ── Upload as workflow artifact (always) ─────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      # ── Attach to GitHub Release (only on version tag push) ──────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true
