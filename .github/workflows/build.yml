name: Build Executables

# Triggers:
#   - Push a version tag:  git tag v1.2 && git push --tags
#   - Manual trigger from the Actions tab
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: retest-tool-linux

          - os: macos-latest
            asset_name: retest-tool-macos

          - os: windows-latest
            asset_name: retest-tool-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller retest.spec

      - name: Rename binary (Linux and macOS)
        if: runner.os != 'Windows'
        run: mv dist/retest-tool dist/${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item dist\retest-tool.exe dist\${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true
