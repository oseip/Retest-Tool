<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nemesis — Setup</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="setup-page">
    <div class="setup-card">
      <div class="logo" style="margin-bottom:4px">⚡ NEMESIS</div>
      <h3>Welcome — let's set up your account</h3>
      <p class="modal-subtitle">
        This runs once. Everything you enter is saved only to your own
        config.yaml on this machine — nobody else sees it.
      </p>

      <form id="setupForm">
        <div class="report-card" style="padding:16px;margin-bottom:18px">
          <div class="report-card-header">Jira</div>
          <div class="report-card-body" style="padding-top:14px;display:flex;flex-direction:column;gap:14px">
            <div class="form-group" style="margin-bottom:0">
              <label>Jira URL</label>
              <input type="text" id="jiraUrl" class="text-input" placeholder="https://your-org.atlassian.net" required>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>Jira Email</label>
              <input type="email" id="jiraEmail" class="text-input" placeholder="you@your-org.com" required>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>Jira API Token</label>
              <input type="password" id="jiraToken" class="text-input" placeholder="Settings → Security → API tokens" required>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>Jira Project Key</label>
              <input type="text" id="jiraProject" class="text-input" placeholder="PROJ" required>
            </div>
          </div>
        </div>

        <div class="report-card" style="padding:16px;margin-bottom:18px">
          <div class="report-card-header">Jump Server</div>
          <div class="report-card-body" style="padding-top:14px;display:flex;flex-direction:column;gap:14px">
            <div class="form-group" style="margin-bottom:0">
              <label>Jump Server Host</label>
              <input type="text" id="jumpHost" class="text-input" placeholder="jump.your-org.com" required>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>Jump Server Username</label>
              <input type="text" id="jumpUser" class="text-input" required>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>Jump Server Password</label>
              <input type="password" id="jumpPassword" class="text-input" required>
            </div>
          </div>
        </div>

        <div class="report-card" style="padding:16px;margin-bottom:18px">
          <div class="report-card-header" style="display:flex;align-items:center;justify-content:space-between">
            <span>Clients / Kali Boxes</span>
            <button type="button" class="btn btn-sm btn-secondary" onclick="addSetupClientRow()">+ Add Client</button>
          </div>
          <div class="report-card-body" style="padding-top:14px">
            <p style="font-size:11px;color:var(--text-dim);margin-bottom:14px">
              Add each client you work on, with that client's Kali box login.
            </p>
            <div id="setupClientRows" style="display:flex;flex-direction:column;gap:18px"></div>
          </div>
        </div>

        <div id="setupStatus" style="margin-bottom:14px;font-size:12px;display:none"></div>

        <div class="modal-actions" style="justify-content:flex-end">
          <button type="submit" class="btn btn-primary" id="setupSubmitBtn">Save &amp; Validate</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="/static/setup.js"></script>
</body>
</html>
